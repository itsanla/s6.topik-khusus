name: Build & Push nosql-s6

on:
  push:
    branches: [main]
    tags: ["ms3.nosql-mongodb/v*.*.*"]
    paths:
      - "ms3.nosql-mongodb/**"
      - ".github/workflows/nosql-s6-docker.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: DOCKER
    steps:
      - uses: actions/checkout@v4

      - name: Generate versi otomatis
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/ms3.nosql-mongodb/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/ms3.nosql-mongodb/v}
            echo "tags=itsanla/nosql-s6:latest,itsanla/nosql-s6:$VERSION" >> $GITHUB_OUTPUT
          else
            echo "tags=itsanla/nosql-s6:latest,itsanla/nosql-s6:sha-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./ms3.nosql-mongodb
          push: true
          tags: ${{ steps.version.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
