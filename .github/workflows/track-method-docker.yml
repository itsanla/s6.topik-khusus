name: Build & Push track-method

on:
  push:
    branches:
      - main
    tags:
      - "track-method/v*.*.*"
    paths:
      - "track-method/**"
      - ".github/workflows/track-method-docker.yml"

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    environment: DOCKER
    
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Generate versi otomatis
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [[ "${{ github.ref }}" == refs/tags/track-method/v* ]]; then
            # Ambil versi dari tag, contoh: track-method/v1.2.3 → 1.2.3
            VERSION=${GITHUB_REF#refs/tags/track-method/v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            echo "tags=itsanla/track-method:latest,itsanla/track-method:$VERSION,itsanla/track-method:$MAJOR.$MINOR,itsanla/track-method:$MAJOR" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            # Push ke main → tag sebagai latest + sha
            echo "tags=itsanla/track-method:latest,itsanla/track-method:sha-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "version=sha-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dan Push image
        uses: docker/build-push-action@v5
        with:
          context: ./track-method
          file: ./track-method/Dockerfile
          push: true
          tags: ${{ steps.version.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ringkasan hasil build
        run: |
          echo "### Docker Image Berhasil Di-push" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** track-method" >> $GITHUB_STEP_SUMMARY
          echo "**Versi:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags yang di-push:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.version.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
