apiVersion: apps/v1
kind: Deployment
metadata:
  name: mq-s6-publisher
  namespace: message-queue
  labels:
    app: mq-s6-publisher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mq-s6-publisher
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mq-s6-publisher
    spec:
      containers:
        - name: mq-s6
          image: itsanla/mq-s6:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: APP_MODE
              value: "publisher"
          envFrom:
            - configMapRef:
                name: mq-s6-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mq-s6-publisher-service
  namespace: message-queue
spec:
  selector:
    app: mq-s6-publisher
  ports:
    - name: http
      port: 80
      targetPort: 8081
  type: ClusterIP
