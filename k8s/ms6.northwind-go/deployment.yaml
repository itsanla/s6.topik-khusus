apiVersion: apps/v1
kind: Deployment
metadata:
  name: northwind-go
  namespace: northwind-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: northwind-go
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: northwind-go
    spec:
      containers:
        - name: northwind-go
          image: itsanla/northwind-s6:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: MONGO_URI
              value: "mongodb://mongodb-service:27017"
            - name: MONGO_DB
              value: "northwind"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: northwind-go-service
  namespace: northwind-go
spec:
  selector:
    app: northwind-go
  ports:
    - port: 80
      targetPort: 8081
  type: ClusterIP
