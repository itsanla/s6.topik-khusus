apiVersion: apps/v1
kind: Deployment
metadata:
  name: track-method
  namespace: track-method
  labels:
    app: track-method
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: track-method
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: track-method
        version: v1
    spec:
      containers:
        - name: track-method
          image: itsanla/track-method:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: track-method-config
            - secretRef:
                name: track-method-secret
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
