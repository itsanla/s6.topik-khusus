apiVersion: apps/v1
kind: Deployment
metadata:
  name: langstats-indonesia
  namespace: langstats-indonesia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: langstats-indonesia
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: langstats-indonesia
    spec:
      containers:
        - name: langstats
          image: itsanla/langstats-s6:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: langstats-service
  namespace: langstats-indonesia
spec:
  selector:
    app: langstats-indonesia
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
